[bar.default]
center = [ "media", "audio_visualizer" ]
end = [
    "tray",
    "notifications",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "control-center",
    "session"
]
margin_edge = 4.0
margin_ends = 4.0
padding = 50
shadow = false
start = [ "launcher", "wallpaper", "workspaces", "clock", "date", "taskbar" ]

[calendar]
enabled = true

[desktop_widgets]
schema_version = 1
widget_order = [ "desktop-widget-0000000000000005", "desktop-widget-0000000000000006", "desktop-widget-0000000000000007" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000005]
    box_height = 0.0
    box_width = 0.0
    cx = 112.0
    cy = 144.0
    output = "DP-5"
    rotation = 0.0
    type = "sysmon"

        [desktop_widgets.widget.desktop-widget-0000000000000005.settings]
        color2 = "on_secondary"
        stat2 = "cpu_temp"

    [desktop_widgets.widget.desktop-widget-0000000000000006]
    box_height = 0.0
    box_width = 0.0
    cx = 112.0
    cy = 288.0
    output = "DP-5"
    rotation = 0.0
    type = "sysmon"

        [desktop_widgets.widget.desktop-widget-0000000000000006.settings]
        color2 = "on_secondary"
        stat = "gpu_usage"
        stat2 = "gpu_temp"

    [desktop_widgets.widget.desktop-widget-0000000000000007]
    box_height = 0.0
    box_width = 0.0
    cx = 112.0
    cy = 431.0
    output = "DP-5"
    rotation = 0.0
    type = "sysmon"

        [desktop_widgets.widget.desktop-widget-0000000000000007.settings]
        stat = "ram_pct"

[hooks]
started = "noctalia msg screen-lock"

[location]
auto_locate = true

[lockscreen]
monitors = [ "DP-5" ]

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
    "lockscreen-login-box@DP-5",
    "lockscreen-login-box@DP-3",
    "lockscreen-widget-0000000000000001",
    "lockscreen-widget-0000000000000003",
    "lockscreen-widget-0000000000000004",
    "lockscreen-widget-0000000000000005"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1331.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-5"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1328.0
    output = "DP-5"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-5".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 128.0
    box_width = 256.0
    cx = 1280.0
    cy = 288.0
    output = "DP-5"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        background_color = "on_secondary"
        background_opacity = 0.0
        clock_style = "digital"
        font_family = "JetBrainsMono Nerd Font"
        format = "{:%I:%M}"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000003]
    box_height = 128.0
    box_width = 384.0
    cx = 2336.0
    cy = 1357.0
    output = "DP-5"
    rotation = 0.0
    type = "media_player"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000003.settings]
        background = true
        background_color = "shadow"
        background_opacity = 0.5
        color = "on_surface"
        hide_when_no_media = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000004]
    box_height = 112.0
    box_width = 304.0
    cx = 184.0
    cy = 1365.80224609375
    output = "DP-5"
    rotation = 0.0
    type = "weather"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000004.settings]
        background = true
        background_color = "shadow"
        background_opacity = 0.5
        color = "on_surface"
        font_family = ""

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000005]
    box_height = 112.0
    box_width = 400.0
    cx = 2336.0
    cy = 1240.0
    output = "DP-5"
    rotation = 0.0
    type = "audio_visualizer"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000005.settings]
        background = false
        bands = 32.0
        centered = false
        color_2 = "on_primary"
        mirrored = false
        show_when_idle = true

[osd.kinds]
lock_keys = false

[plugins]
enabled = [ "noctalia/translator" ]

[shell]
font_family = "JetBrainsMono Nerd Font"
polkit_agent = true
settings_show_advanced = true
telemetry_enabled = false

    [shell.panel]
    clipboard_placement = "floating"
    control_center_placement = "floating"
    launcher_session_search = true
    shadow = false
    transparency_mode = "glass"
    wallpaper_placement = "centered"

    [shell.screenshot]
    copy_to_clipboard = true
    directory = "/home/maxfh/Pictures/screenshots"

[system.monitor]
cpu_poll_seconds = 1

[theme]
builtin = "Ayu"
community_palette = "Mine"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-rainbow"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "hyprland", "kitty", "qt" ]
    community_ids = [ "spicetify", "zen-browser", "neovim", "steam", "yazi" ]

[wallpaper]
directory = "/home/maxfh/Pictures/wallpapers"

    [wallpaper.default]
    path = "/home/maxfh/Pictures/wallpapers/natural_bridges1.jpg"

    [wallpaper.last]
    path = "/home/maxfh/Pictures/wallpapers/natural_bridges1.jpg"

    [wallpaper.monitors.DP-1]
    path = "/home/maxfh/Pictures/wallpapers/mountains_blue.png"

    [wallpaper.monitors.DP-3]
    path = "/home/maxfh/Pictures/wallpapers/natural_bridges1.jpg"

    [wallpaper.monitors.DP-5]
    path = "/home/maxfh/Pictures/wallpapers/natural_bridges1.jpg"

[weather]
auto_locate = true
unit = "imperial"

[widget.audio_visualizer]
bands = 64
centered = false
color_2 = "secondary"
mirrored = false
width = 150.0

[widget.audio_visualizer_l]
bands = 64
centered = false
mirrored = false
type = "audio_visualizer"
width = 149.0

[widget.clock]
format = "{:%I:%M}"

[widget.date]
format = "{:%a %b %d}"

[widget.media]
hide_when_no_media = true
max_length = 150
title_scroll = "on_hover"

[widget.taskbar]
group_by_workspace = true
group_single_icon_per_app = true
show_all_outputs = true
workspace_label_placement = "centered"